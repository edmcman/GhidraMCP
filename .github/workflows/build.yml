name: Build with Gradle

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GHIDRA_VERSION: 12.0.4
      GHIDRA_DATE: 20260303

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Cache Ghidra
      id: cache-ghidra
      uses: actions/cache@v4
      with:
        path: ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC
        key: ghidra-${{ env.GHIDRA_VERSION }}

    - name: Download Ghidra
      if: steps.cache-ghidra.outputs.cache-hit != 'true'
      run: |
        wget --no-verbose -O ghidra.zip https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${{ env.GHIDRA_VERSION }}_build/ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC_${{ env.GHIDRA_DATE }}.zip
        7z x -bd ghidra.zip

    - name: Build with Gradle
      env:
        GHIDRA_INSTALL_DIR: ${{ github.workspace }}/ghidra_${{ env.GHIDRA_VERSION }}_PUBLIC
      run: ./gradlew buildExtension

    - name: Assemble release directory
      run: |
        mkdir release
        cp dist/*_GhidraMCP.zip release/
        cp bridge_mcp_ghidra.py release/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GhidraMCP-artifact
        path: |
          release/*
